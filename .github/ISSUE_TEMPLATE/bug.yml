name: Bug Report
description: Report a bug in LM Gate
labels: ["bug"]
body:
  - type: dropdown
    id: deployment-type
    attributes:
      label: Deployment Type
      options:
        - Docker - Standalone
        - Omnigate (CPU)
        - Omnigate (NVIDIA)
        - Omnigate (AMD)
        - Binary
        - Build from Source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The version of LM Gate you are running (e.g. v0.1.0 or 0.1.0)
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: host-os
    attributes:
      label: Host OS
      options:
        - Linux
        - macOS
        - FreeBSD
        - Windows
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. This will be automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or configuration details that may be helpful.
    validations:
      required: false
